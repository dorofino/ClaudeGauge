<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 {
      font-size: 15px;
      color: #ff9944;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 svg { width: 20px; height: 20px; fill: #ff9944; flex-shrink: 0; }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .status.loading { background: #2a2a4a; color: #aaa; }
    .status.found { background: #1a3a2a; color: #7fdf7f; }
    .status.error { background: #3a1a1a; color: #ff7f7f; }
    .key-box {
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      word-break: break-all;
      max-height: 60px;
      overflow: hidden;
      margin-bottom: 12px;
      color: #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.copy {
      background: #ff9944;
      color: #1a1a2e;
    }
    button.copy:hover { background: #ffaa66; }
    button.copied {
      background: #44aa44;
      color: white;
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
    .step {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .step b { color: #ff9944; }
  </style>
</head>
<body>
  <h1><svg viewBox="0 0 24 24"><path d="M7 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm0 3a5 5 0 0 1-4.9-4H1v-2h1.1A5 5 0 0 1 12 9.58l7.3-7.3 2.12 2.13-2.12 2.12 1.41 1.41-2.12 2.13-1.41-1.42-1.42 1.42-1.41-1.42L12 11.42A5 5 0 0 1 7 17Z"/></svg> Claude Session Key</h1>

  <div id="content">
    <div class="status loading">Checking for session key...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
